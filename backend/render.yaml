services:
  - type: web
    name: alliance-treasury-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PACKAGE_ID
        value: 0x2be233510be68984d0f99d3095ad2e63507e5ed41335f60e5b9877aa8de431f5
      - key: SUI_RPC_URL
        value: https://fullnode.testnet.sui.io:443
      - key: WORLD_PACKAGE_ID
        value: 0xd12a70c74c1e759445d6f209b01d43d860e97fcf2ef72ccbbd00afd828043f75
      - key: PORT
        value: 3001
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
